<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3d AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient background -->
  <div class="ambient"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <div class="loader-text">Memuat Model 3D</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <span class="logo-text">Warisan Nusantara</span>
    </div>
    <span class="badge">3D · AR · Interaktif</span>
  </header>

  <!--
    scale="0.15 0.15 0.15"       → lebih besar di web viewer (naik dari 0.05)
    camera-orbit="0deg 65deg 12m" → lebih dekat supaya model kelihatan besar
    ar-scale="auto"               → user bisa pinch resize di AR
  -->
  <model-viewer
    id="viewer"
    src="../../assets/models/jambi/rumahjambi.glb"
    ar
    ar-modes="scene-viewer webxr quick-look"
    ar-scale="auto"
    ar-placement="floor"
    scale="0.15 0.15 0.15"
    camera-controls
    auto-rotate
    auto-rotate-delay="1000"
    rotation-per-second="6deg"
    camera-orbit="0deg 65deg 12m"
    min-camera-orbit="auto auto 5m"
    max-camera-orbit="auto auto 50m"
    field-of-view="45deg"
    min-field-of-view="20deg"
    max-field-of-view="70deg"
    shadow-intensity="1.2"
    shadow-softness="0.8"
    exposure="1.1"
    interaction-prompt="none"
    touch-action="pan-y"
  >
    <!-- Slot AR button -->
    <button slot="ar-button" id="ar-slot-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8
                 a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
      </svg>
      Buka AR
    </button>

    <!-- Panel ukuran model — tampil hanya saat AR aktif -->
    <div id="ar-scale-panel">
      <span class="ar-scale-label">Ukuran Model</span>
      <div class="ar-scale-row">
        <button id="ar-scale-down" class="ar-scale-btn">−</button>
        <span id="ar-scale-val">15%</span>
        <button id="ar-scale-up"   class="ar-scale-btn">+</button>
      </div>
    </div>

  </model-viewer>

  <!-- Rotate hint -->
  <div class="hint">
    <div class="hint-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C9A84C"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M2.5 22v-6h6"/>
        <path d="M2.66 15.57a10 10 0 1017.68-8.14"/>
      </svg>
    </div>
    <span class="hint-label">Geser &amp; Putar</span>
  </div>

  <!-- Bottom panel -->
  <div class="bottom-panel">

    <div class="info-block">
      <div class="gold-line"></div>
    </div>

    <div class="controls">

      <!-- Tombol AR utama -->
      <button class="btn-ar" id="ar-trigger" title="Lihat di AR">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8
                   a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
        </svg>
        Lihat di AR
      </button>

      <div class="ctrl-row">
        <!-- Reset camera -->
        <button class="ctrl-btn" id="btn-reset" title="Reset Kamera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M2.66 15.57a10 10 0 1017.68-8.14"/>
          </svg>
        </button>

        <!-- Toggle auto-rotate -->
        <button class="ctrl-btn" id="btn-rotate" title="Putar Otomatis">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>

        <!-- Zoom in -->
        <button class="ctrl-btn" id="btn-zoomin" title="Zoom In">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8"  x2="11"    y2="14"/>
            <line x1="8"  y1="11" x2="14"    y2="11"/>
          </svg>
        </button>

        <!-- Zoom out -->
        <button class="ctrl-btn" id="btn-zoomout" title="Zoom Out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8"  y1="11" x2="14"    y2="11"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
