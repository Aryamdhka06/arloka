<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D AR Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="ambient"></div>

  <!-- LOADING -->
  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <div class="loader-text">Memuat Model 3D</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <span class="logo-text">Warisan Nusantara</span>
    </div>
    <span class="badge">3D · AR · Interaktif</span>
  </header>

  <!-- MODEL VIEWER -->
  <model-viewer
    id="viewer"
    src=""
    ar
    ar-modes="scene-viewer webxr quick-look"
    ar-scale="auto"
    ar-placement="floor"

    scale="0.15 0.15 0.15"

    camera-controls
    auto-rotate
    auto-rotate-delay="1000"
    rotation-per-second="6deg"

    camera-orbit="0deg 65deg 3.5m"
    min-camera-orbit="auto auto 1.5m"
    max-camera-orbit="auto auto 8m"

    field-of-view="35deg"
    min-field-of-view="20deg"
    max-field-of-view="70deg"

    shadow-intensity="1.2"
    shadow-softness="0.8"
    exposure="1.1"
    interaction-prompt="none"
    touch-action="pan-y"
  >

    <!-- AR BUTTON -->
    <button slot="ar-button" id="ar-slot-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8
                 a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
      </svg>
      Buka AR
    </button>

    <!-- SCALE PANEL -->
    <div id="ar-scale-panel">
      <span class="ar-scale-label">Ukuran Model</span>
      <div class="ar-scale-row">
        <button id="ar-scale-down" class="ar-scale-btn">−</button>
        <span id="ar-scale-val">15%</span>
        <button id="ar-scale-up" class="ar-scale-btn">+</button>
      </div>
    </div>

  </model-viewer>

  <!-- HINT -->
  <div class="hint">
    <span>Geser & Putar</span>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">

    <button class="btn-ar" id="ar-trigger">Lihat di AR</button>

    <div class="ctrl-row">
      <button class="ctrl-btn" id="btn-reset">Reset</button>
      <button class="ctrl-btn" id="btn-rotate">Rotate</button>
      <button class="ctrl-btn" id="btn-zoomin">+</button>
      <button class="ctrl-btn" id="btn-zoomout">-</button>
    </div>

  </div>

  <!-- 🔥 SCRIPT DINAMIS MODEL LOADER -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const model = params.get("model");

    const viewer = document.getElementById("viewer");
    const loading = document.getElementById("loading-overlay");

    function hideLoading() {
      loading.style.display = "none";
    }

    if (!model) {
      loading.innerHTML = "<h2 style='color:white'>Model tidak ditemukan</h2>";
    } else {
      // set path model
      viewer.src = "../../models/" + model;

      // hide loading setelah model siap
      viewer.addEventListener("load", () => {
        setTimeout(hideLoading, 500);
      });

      // fallback kalau error
      viewer.addEventListener("error", () => {
        loading.innerHTML = "<h2 style='color:red'>Gagal load model</h2>";
      });
    }
  </script>

  <script src="main.js"></script>
</body>
</html>
